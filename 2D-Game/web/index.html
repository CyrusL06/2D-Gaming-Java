<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2D Adventure (Browser)</title>
  <script src="https://cjrtnc.leaningtech.com/4.2/loader.js"></script>
  <style>
    html, body { margin: 0; height: 100%; background: #0b0b0b; color: #f5f5f5; font-family: sans-serif; }
    #container { width: 100vw; height: 100svh; }
    #status { position: fixed; top: 10px; left: 10px; padding: 6px 10px; background: rgba(0,0,0,.6); border: 1px solid #333; border-radius: 6px; font-size: 12px; }
  </style>
</head>
<body>
  <div id="status">Loading...</div>
  <div id="container"></div>

  <script type="module">
    const status = document.getElementById("status");
    const container = document.getElementById("container");

    try {
      status.textContent = "Initializing Java runtime...";
      await cheerpjInit();

      status.textContent = "Creating display...";
      cheerpjCreateDisplay(-1, -1, container);

      status.textContent = "Starting game...";
      await cheerpjRunJar("/app/2d-game.jar");

      status.remove();
    } catch (err) {
      console.error(err);
      status.textContent = "Failed to start. Check console.";
    }
  </script>
</body>
</html>
